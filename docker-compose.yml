services:
  postgres:
    image: postgres:15-alpine
    container_name: DAG_Postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: prateek
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - dag_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dag_pg_data: